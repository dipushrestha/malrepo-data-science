version: 2

sources:
  - name: raw
    schema: public
    tables:
      - name: transactions
        description: Raw transaction data
        columns:
          - name: transaction_id
            tests: [unique, not_null]
          - name: transaction_amount
            tests: [not_null]

models:
  - name: stg_transactions
    description: Cleaned and standardized transactions
    columns:
      - name: transaction_id
        tests: [unique, not_null]
      - name: transaction_amount
        tests: [not_null]

  - name: fct_daily_metrics
    description: Daily aggregated transaction metrics
    columns:
      - name: metric_date
        tests: [unique, not_null]
      - name: total_transactions
        tests: [not_null]

# FinAnalytics pipeline configuration

data:
  raw_dir: data/raw
  interim_dir: data/interim
  processed_dir: data/processed
  source: local  # local | snowflake | s3

features:
  numerical:
    - transaction_amount
    - account_balance
    - days_since_last_transaction
    - transaction_count_7d
    - transaction_count_30d
    - avg_transaction_amount_30d
  categorical:
    - merchant_category
    - transaction_type
    - day_of_week
    - hour_of_day
  target: is_fraud

model:
  algorithm: xgboost  # xgboost | lightgbm | random_forest
  test_size: 0.2
  random_state: 42

xgboost:
  n_estimators: 500
  max_depth: 6
  learning_rate: 0.05
  subsample: 0.8
  colsample_bytree: 0.8
  min_child_weight: 5
  reg_alpha: 0.1
  reg_lambda: 1.0

lightgbm:
  n_estimators: 500
  max_depth: -1
  num_leaves: 63
  learning_rate: 0.05
  subsample: 0.8
  colsample_bytree: 0.8

random_forest:
  n_estimators: 300
  max_depth: 20
  min_samples_split: 5
  min_samples_leaf: 2
